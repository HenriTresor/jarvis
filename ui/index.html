<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S.</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #020c1a;
  --panel: #040f1f;
  --border: #0a2a45;
  --accent: #00b8ff;
  --accent2: #0066cc;
  --glow: rgba(0, 184, 255, 0.12);
  --glow-strong: rgba(0, 184, 255, 0.35);
  --text: #8ecff0;
  --text-bright: #d0eeff;
  --dim: #1e4a6a;
  --dim2: #2a5a7a;
  --danger: #ff4444;
  --warn: #ffaa00;
  --success: #00ff88;
  --font: 'Courier New', 'Lucida Console', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  height: 100vh;
  display: grid;
  grid-template-rows: 44px 1fr;
  overflow: hidden;
  user-select: none;
}

/* ── Header ──────────────────────────────── */
header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  position: relative;
}

header h1 {
  font-size: 15px;
  letter-spacing: 6px;
  color: var(--accent);
  text-shadow: 0 0 12px var(--accent);
}

.header-sep { flex: 1; }

.sys-info {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--dim2);
  display: flex;
  gap: 20px;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  letter-spacing: 2px;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: blink 2.5s ease-in-out infinite;
}

.status-dot.offline { background: var(--danger); box-shadow: 0 0 8px var(--danger); animation: none; }
.status-dot.processing { background: var(--warn); box-shadow: 0 0 8px var(--warn); animation: blink 0.4s ease-in-out infinite; }

/* ── Main layout ─────────────────────────── */
main {
  display: grid;
  grid-template-columns: 1fr 360px;
  overflow: hidden;
}

/* ── Left panel ──────────────────────────── */
.left-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

/* Background grid effect */
.left-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.3;
}

/* ── Arc reactor ─────────────────────────── */
.arc-reactor {
  width: 220px;
  height: 220px;
  position: relative;
  flex-shrink: 0;
  z-index: 1;
}

.ring {
  position: absolute;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border: 1.5px solid var(--accent);
  box-shadow: 0 0 8px rgba(0, 184, 255, 0.3), inset 0 0 8px rgba(0, 184, 255, 0.1);
  transition: box-shadow 0.3s ease, opacity 0.3s ease;
}

.ring-1 { width: 220px; height: 220px; opacity: 0.2; border-style: dashed; }
.ring-2 { width: 178px; height: 178px; opacity: 0.45; animation: spin 10s linear infinite; }
.ring-3 { width: 136px; height: 136px; opacity: 0.65; animation: spin 7s linear infinite reverse; }
.ring-4 { width: 96px;  height: 96px;  opacity: 0.8; }
.ring-5 { width: 62px;  height: 62px;  opacity: 0.9; border-style: dashed; animation: spin 4s linear infinite; }

.core {
  position: absolute;
  width: 38px; height: 38px;
  background: radial-gradient(circle, #ffffff 0%, var(--accent) 35%, var(--accent2) 65%, transparent 100%);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent2), 0 0 80px rgba(0, 102, 204, 0.4);
  animation: pulse-core 2.5s ease-in-out infinite;
  z-index: 2;
}

/* Arcs on ring-2 */
.arc-segment {
  position: absolute;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 178px; height: 178px;
  border: 2px solid transparent;
  border-top-color: var(--accent);
  box-shadow: none;
}

.arc-segment:nth-child(2) { animation: spin 3s linear infinite; border-top-color: var(--accent); }
.arc-segment:nth-child(3) { animation: spin 4.5s linear infinite reverse; border-bottom-color: rgba(0,184,255,0.5); border-top-color: transparent; }

/* ── Mode label ──────────────────────────── */
.mode-label {
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--dim2);
  text-transform: uppercase;
  text-align: center;
  z-index: 1;
  transition: color 0.3s;
}

.mode-label.listening { color: var(--accent2); }
.mode-label.speaking  { color: var(--accent); text-shadow: 0 0 8px var(--accent); }
.mode-label.processing { color: var(--warn); }

/* ── Waveform ─────────────────────────────── */
.waveform-wrap {
  width: 100%;
  max-width: 520px;
  z-index: 1;
  position: relative;
}

#waveform {
  display: block;
  width: 100%;
  height: 72px;
  border: 1px solid var(--border);
  background: rgba(0, 10, 24, 0.8);
}

/* ── Input bar ────────────────────────────── */
.input-bar {
  display: flex;
  gap: 8px;
  width: 100%;
  max-width: 520px;
  z-index: 1;
}

.input-bar input {
  flex: 1;
  background: rgba(4, 15, 31, 0.9);
  border: 1px solid var(--border);
  color: var(--text-bright);
  font-family: var(--font);
  font-size: 13px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s;
}

.input-bar input:focus { border-color: var(--accent2); }
.input-bar input::placeholder { color: var(--dim); }

.btn {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
}

.btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 8px var(--glow); }

.btn-mic { font-size: 16px; padding: 10px 12px; }
.btn-mic.active { background: var(--accent); color: var(--bg); border-color: var(--accent); box-shadow: 0 0 14px var(--accent); }

.btn-send { background: var(--accent2); border-color: var(--accent2); color: #fff; font-weight: bold; }
.btn-send:hover { background: var(--accent); border-color: var(--accent); }

/* ── Right panel (chat) ───────────────────── */
.chat-panel {
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat-head {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
}

.chat-log {
  flex: 1;
  overflow-y: auto;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.chat-log::-webkit-scrollbar { width: 3px; }
.chat-log::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

.msg { max-width: 92%; font-size: 12.5px; line-height: 1.55; }

.msg-who {
  font-size: 9px;
  letter-spacing: 2.5px;
  margin-bottom: 4px;
  text-transform: uppercase;
}

.msg-body {
  padding: 9px 12px;
  border-radius: 2px;
}

.msg.user { align-self: flex-end; }
.msg.user .msg-who { color: var(--dim2); text-align: right; }
.msg.user .msg-body { background: rgba(0, 102, 204, 0.12); border: 1px solid rgba(0, 102, 204, 0.3); color: var(--text-bright); }

.msg.jarvis { align-self: flex-start; }
.msg.jarvis .msg-who { color: var(--accent); }
.msg.jarvis .msg-body { background: rgba(0, 20, 40, 0.7); border: 1px solid var(--border); color: var(--text); }

.msg.jarvis.typing .msg-body::after {
  content: '▌';
  animation: blink 0.7s step-end infinite;
}

/* ── Animations ───────────────────────────── */
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

@keyframes pulse-core {
  0%, 100% { box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent2), 0 0 80px rgba(0, 102, 204, 0.4); }
  50% { box-shadow: 0 0 30px var(--accent), 0 0 60px var(--accent2), 0 0 100px rgba(0, 102, 204, 0.6); }
}

@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to   { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes reactor-pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50%       { transform: translate(-50%, -50%) scale(1.08); }
}

/* Speaking state: brighten reactor */
body.speaking .core {
  box-shadow: 0 0 40px var(--accent), 0 0 80px var(--accent2), 0 0 140px rgba(0,184,255,0.5);
  animation: pulse-core 0.4s ease-in-out infinite, reactor-pulse 0.4s ease-in-out infinite;
}
body.speaking .ring { opacity: 1 !important; box-shadow: 0 0 16px rgba(0,184,255,0.5); }

body.processing .core {
  box-shadow: 0 0 15px var(--warn), 0 0 30px rgba(255,170,0,0.4);
}
</style>
</head>
<body>

<header>
  <h1>J.A.R.V.I.S.</h1>
  <div class="sys-info">
    <span id="hdr-time">--:--:--</span>
    <span id="hdr-model">llama3.1:8b</span>
  </div>
  <div class="header-sep"></div>
  <div class="status-badge">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-txt" style="color:var(--dim2);font-size:10px;letter-spacing:2px;">INITIALIZING</span>
  </div>
</header>

<main>
  <!-- Left: visualizer -->
  <section class="left-panel">
    <div class="arc-reactor">
      <div class="ring ring-1"></div>
      <div class="arc-segment"></div>
      <div class="arc-segment"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="ring ring-4"></div>
      <div class="ring ring-5"></div>
      <div class="core"></div>
    </div>

    <div class="mode-label" id="mode-lbl">INITIALIZING</div>

    <div class="waveform-wrap">
      <canvas id="waveform" width="520" height="72"></canvas>
    </div>

    <div class="input-bar">
      <button class="btn btn-mic" id="mic-btn" title="Toggle always-listening">🎙</button>
      <input type="text" id="txt-input" placeholder="Speak or type a command..." autocomplete="off" />
      <button class="btn btn-send" id="send-btn">SEND</button>
    </div>
  </section>

  <!-- Right: chat -->
  <section class="chat-panel">
    <div class="chat-head">
      <span>INTERACTION LOG</span>
      <span id="chat-count" style="color:var(--dim2);margin-left:auto;">0 ENTRIES</span>
    </div>
    <div class="chat-log" id="chat-log">
      <div class="msg jarvis">
        <div class="msg-who">J.A.R.V.I.S.</div>
        <div class="msg-body">Online and standing by, sir.</div>
      </div>
    </div>
  </section>
</main>

<script>
// ── State ────────────────────────────────────────────────────
let audioCtx   = null;
let analyser   = null;
let micSource  = null;
let isListening  = false;
let isSpeaking   = false;
let isProcessing = false;
let recognition  = null;
let silenceTimer = null;
let msgCount     = 1;

const canvas   = document.getElementById('waveform');
const ctx      = canvas.getContext('2d');
const chatLog  = document.getElementById('chat-log');
const txtInput = document.getElementById('txt-input');
const modeLabel= document.getElementById('mode-lbl');
const micBtn   = document.getElementById('mic-btn');
const statusDot= document.getElementById('status-dot');
const statusTxt= document.getElementById('status-txt');

// ── Clock ─────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('hdr-time').textContent =
    now.toTimeString().slice(0,8);
}
setInterval(updateClock, 1000);
updateClock();

// ── Init ──────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/status').then(r => r.json()).catch(() => null);
    if (res && res.status === 'online') {
      setStatus('ONLINE', 'online');
      if (res.model) document.getElementById('hdr-model').textContent = res.model;
    } else {
      setStatus('API OFFLINE', 'offline');
    }
  } catch (_) {
    setStatus('OFFLINE', 'offline');
  }

  // Web Audio
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser  = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.75;

  // Mic
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    micSource = audioCtx.createMediaStreamSource(stream);
    micSource.connect(analyser);
  } catch (e) {
    console.warn('[Jarvis] Mic access denied — text mode only');
    setMode('TEXT ONLY', '');
  }

  // Speech recognition
  initSTT();

  // Waveform loop
  drawWaveform();
}

// ── Speech Recognition (always-listening) ─────────────────────
function initSTT() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { console.warn('[Jarvis] SpeechRecognition not supported'); return; }

  recognition = new SR();
  recognition.continuous      = true;
  recognition.interimResults  = true;
  recognition.lang            = 'en-US';
  recognition.maxAlternatives = 1;

  let interim = '';
  let committed = '';

  recognition.onresult = (e) => {
    if (isSpeaking || isProcessing) return;

    interim   = '';
    committed = '';

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) committed += t;
      else interim += t;
    }

    txtInput.value = committed || interim;

    clearTimeout(silenceTimer);
    if (committed.trim()) {
      silenceTimer = setTimeout(() => {
        const msg = committed.trim();
        if (msg) { committed = ''; sendMessage(msg); }
      }, 900);
    }
  };

  recognition.onerror = (e) => {
    if (e.error !== 'no-speech' && e.error !== 'aborted')
      console.warn('[STT] Error:', e.error);
  };

  recognition.onend = () => {
    if (isListening && !isSpeaking) {
      setTimeout(() => { try { recognition.start(); } catch(_){} }, 100);
    }
  };

  startListening();
}

function startListening() {
  isListening = true;
  micBtn.classList.add('active');
  if (recognition) try { recognition.start(); } catch(_){}
  if (!isSpeaking && !isProcessing) setMode('LISTENING', 'listening');
}

function stopListening() {
  isListening = false;
  micBtn.classList.remove('active');
  if (recognition) try { recognition.stop(); } catch(_){}
  if (!isSpeaking && !isProcessing) setMode('STANDBY', '');
}

// ── Send message ──────────────────────────────────────────────
async function sendMessage(text) {
  text = text.trim();
  if (!text || isProcessing) return;

  txtInput.value   = '';
  isProcessing     = true;
  clearTimeout(silenceTimer);

  if (recognition) try { recognition.stop(); } catch(_){}

  addMsg('user', text);
  setMode('PROCESSING', 'processing');
  setStatus('PROCESSING', 'processing');
  document.body.classList.add('processing');

  try {
    const res = await fetch('/chat/audio', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    addMsg('jarvis', data.response);
    setStatus('ONLINE', 'online');
    document.body.classList.remove('processing');

    if (data.audio) {
      await playJarvisAudio(data.audio);
    } else {
      setMode('LISTENING', 'listening');
    }
  } catch (err) {
    console.error('[Jarvis] Error:', err);
    addMsg('jarvis', 'I encountered a system error, sir. Please check the logs.');
    setStatus('ERROR', 'offline');
    document.body.classList.remove('processing');
    setMode('LISTENING', 'listening');
  } finally {
    isProcessing = false;
    if (isListening) {
      setTimeout(() => { try { recognition && recognition.start(); } catch(_){} }, 600);
    }
  }
}

// ── Play Jarvis audio + waveform visualization ─────────────────
async function playJarvisAudio(audioB64) {
  try {
    isSpeaking = true;
    setMode('SPEAKING', 'speaking');
    document.body.classList.add('speaking');
    document.body.classList.remove('processing');

    // Decode base64 → ArrayBuffer
    const binaryStr = atob(audioB64);
    const bytes = new Uint8Array(binaryStr.length);
    for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

    // Decode WAV → AudioBuffer
    const audioBuffer = await audioCtx.decodeAudioData(bytes.buffer.slice(0));

    // Disconnect mic from analyser while Jarvis speaks
    if (micSource) try { micSource.disconnect(analyser); } catch(_){}

    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(analyser);
    source.connect(audioCtx.destination);

    source.onended = () => {
      isSpeaking = false;
      document.body.classList.remove('speaking');
      // Reconnect mic
      if (micSource) try { micSource.connect(analyser); } catch(_){}
      setMode(isListening ? 'LISTENING' : 'STANDBY', isListening ? 'listening' : '');
    };

    source.start();
  } catch (err) {
    console.error('[Jarvis] Audio play error:', err);
    isSpeaking = false;
    document.body.classList.remove('speaking');
    if (micSource) try { micSource.connect(analyser); } catch(_){}
    setMode('LISTENING', 'listening');
  }
}

// ── Waveform ──────────────────────────────────────────────────
function drawWaveform() {
  requestAnimationFrame(drawWaveform);

  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if (!analyser) return;

  const bufLen = analyser.frequencyBinCount;
  const timeDom = new Uint8Array(bufLen);
  const freqDom = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(timeDom);
  analyser.getByteFrequencyData(freqDom);

  // Color based on state
  let color, glowSize;
  if (isSpeaking) {
    color    = '#00b8ff';
    glowSize = 16;
  } else if (isProcessing) {
    color    = '#ffaa00';
    glowSize = 8;
  } else if (isListening) {
    color    = '#0055aa';
    glowSize = 6;
  } else {
    color    = '#0a2a45';
    glowSize = 0;
  }

  // Draw frequency bars (background)
  const barW = W / bufLen;
  for (let i = 0; i < bufLen; i++) {
    const barH = (freqDom[i] / 255) * H * 0.55;
    const alpha = (freqDom[i] / 255) * 0.25;
    ctx.fillStyle = `rgba(0, 184, 255, ${alpha})`;
    ctx.fillRect(i * barW, H - barH, barW - 0.5, barH);
  }

  // Draw waveform line
  ctx.strokeStyle = color;
  ctx.lineWidth   = 1.5;
  ctx.shadowColor = color;
  ctx.shadowBlur  = glowSize;

  ctx.beginPath();
  const sliceW = W / bufLen;
  for (let i = 0; i < bufLen; i++) {
    const v = timeDom[i] / 128.0;
    const y = (v * H) / 2;
    if (i === 0) ctx.moveTo(0, y);
    else ctx.lineTo(i * sliceW, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// ── UI helpers ────────────────────────────────────────────────
function addMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const who = document.createElement('div');
  who.className = 'msg-who';
  who.textContent = role === 'user' ? 'YOU' : 'J.A.R.V.I.S.';

  const body = document.createElement('div');
  body.className = 'msg-body';
  body.textContent = text;

  wrap.appendChild(who);
  wrap.appendChild(body);
  chatLog.appendChild(wrap);
  chatLog.scrollTop = chatLog.scrollHeight;

  msgCount++;
  document.getElementById('chat-count').textContent = `${msgCount} ENTRIES`;
}

function setMode(text, cls) {
  modeLabel.textContent = text;
  modeLabel.className = 'mode-label' + (cls ? ` ${cls}` : '');
}

function setStatus(text, state) {
  statusTxt.textContent = text;
  statusDot.className = 'status-dot' + (state === 'online' ? '' : ` ${state}`);
  const colors = { online: 'var(--accent)', offline: 'var(--danger)', processing: 'var(--warn)' };
  const c = colors[state] || 'var(--dim)';
  statusDot.style.background  = c;
  statusDot.style.boxShadow   = `0 0 8px ${c}`;
}

// ── Event listeners ───────────────────────────────────────────
micBtn.addEventListener('click', () => {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (isListening) stopListening();
  else startListening();
});

document.getElementById('send-btn').addEventListener('click', () => {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  sendMessage(txtInput.value);
});

txtInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    sendMessage(txtInput.value);
  }
});

// Resume audio context on any click (browser policy)
document.addEventListener('click', () => {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });

// ── Start ─────────────────────────────────────────────────────
init();
</script>
</body>
</html>
